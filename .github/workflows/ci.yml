name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Compile Python
        run: python3 -m py_compile src/ipv6monitor.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate shell syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
