# Network interface to monitor. Use "auto" to detect the default-route interface.
INTERFACE=auto

# Kernel counter polling interval in seconds.
REFRESH_INTERVAL=0.5

# Persistent totals are committed to SQLite at this interval.
SAVE_INTERVAL=10

# Store one aggregated history sample at this interval.
HISTORY_INTERVAL=60

# Delete history samples older than this many days. Set 0 to keep forever.
HISTORY_RETENTION_DAYS=30

# Runtime and persistent storage paths.
RUNTIME_DIR=/run/ipv6monitor
STATE_DIR=/var/lib/ipv6monitor
